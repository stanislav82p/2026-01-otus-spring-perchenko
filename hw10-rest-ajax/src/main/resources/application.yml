spring:
  datasource:
    url: jdbc:h2:mem:maindb
    initialization-mode: never

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      schema-locations: classpath:schema.sql

  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        format_sql: false

    show-sql: true

  mvc:
    hiddenmethod:
      filter:
        enabled: true

  shell:
    interactive:
      enabled: false

  logging:
    level:
      ROOT: ERROR