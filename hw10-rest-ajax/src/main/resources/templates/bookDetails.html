<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title-book-details}">Детали книги</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        .filters {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .filters select,
        .filters button {
            padding: 6px 10px;
            font-size: 14px;
        }

        .table-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .table-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        table {
            border-collapse: collapse;
            width: auto; /* wrap_content */
        }

        th, td {
            border: 1px solid #000;
            padding: 8px 12px;
        }

        .table-footer {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<a href="/books" th:text="#{back-home}">Home</a>

<br/>

<h1 th:text="#{title-book}">Книга</h1>

<div class="table-container">
    <div class="table-title" th:text="#{title-details}">Детали</div>

    <table>
        <tbody>
            <tr>
                <td>ID</td>
                <td th:text="${book.id}">1</td>
            </tr>
            <tr>
                <td th:text="#{property-title}">Название</td>
                <td th:text="${book.title}" />
            </tr>
            <tr>
                <td th:text="#{property-author}">Автор</td>
                <td th:text="${book.author.fullName}" />
            </tr>
            <tr>
                <td th:text="#{property-genres}">Жанры</td>
                <td>
                    <li th:each="genre : ${book.genres}" th:text="${genre.name}" />
                </td>
            </tr>
            <tr>
                <td th:text="#{num-comments}">N комментариев</td>
                <td th:text="${comments.size()}" />
            </tr>
        </tbody>
    </table>

    <div class="row">
        <form th:action="@{/books/{id}/editor(id=${book.id})}">
            <button type="submit" th:text="#{action-edit-book}">Редактировать книгу</button>
        </form>
    </div>

</div>

<br/>
<br/>

<div class="table-container">
    <div class="table-title" th:text="#{title-comments}">Комментарии</div>

    <form th:action="@{/books/{id}/commenter(id=${book.id})}">
        <button type="submit" th:text="#{action-create-new}">Создать новый</button>
    </form>

    <br/>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th th:text="#{property-reader}">Читатель</th>
            <th th:text="#{property-date}">Дата</th>
            <th th:text="#{property-comment}">Комментарий</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="comment : ${comments}">
            <td th:text="${comment.id}" />
            <td th:text="${comment.reader.fullName}" />
            <td th:text="${comment.date}" />
            <td th:text="${comment.text}" />
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
