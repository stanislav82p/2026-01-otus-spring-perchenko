<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Написать комментарий</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        .filters {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .filters select,
        .filters button {
            padding: 6px 10px;
            font-size: 14px;
        }

        .table-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .table-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        table {
            border-collapse: collapse;
            width: auto; /* wrap_content */
        }

        th, td {
            border: 1px solid #000;
            padding: 8px 12px;
        }

        .table-footer {
            margin-top: 10px;
        }

        .errors {
            color: red;
        }

        .row {
            margin-top: 10px;
        }
    </style>
    <script>
        function loadData(bookId) {
            console.log("Loading data for Book ID: ", bookId);

            const header = document.getElementById("title");
            const btnDelete = document.getElementById("btn_delete");

            btnDelete.disabled = true

            fetch(`/api/library/books/${bookId}`)
                .then(response => response.json())
                .then(book => {
                    header.innerHTML += ": " + book.title + "?";
                    btnDelete.disabled = false
                });
        }

        function deleteBook(bookId) {
            console.log("Called deleteDook() for ID: ", bookId);
            fetch(`/api/library/books/${bookId}`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json'
                }
            }).then(response => {
                console.log("Response = ", response);
                if (response.ok) {
                    window.location.replace("/books")
                }
            });
        }
    </script>
</head>

<body>
    <h1 id="title" th:text="#{sure-to-delete-book}">Вы действительно хотите удалить книгу ХХХХХХХХ?</h1>

    <div class="row">

        <button id="btn_delete" type="button" th:onclick="'deleteBook(' + ${book_id} + ')'" th:text="#{action-yes}">Да, конечно</button>

        <form action="#" th:action="@{/books/{id}(id=${book_id})}">
            <button type="submit" th:text="#{action-no}">Нет, не нужно</button>
        </form>
    </div>

    <script th:text="'loadData(' + ${book_id} + ')'"></script>
</body>

</html>
