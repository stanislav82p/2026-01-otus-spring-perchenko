<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title-genres}">Жанры</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        .filters {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .filters select,
        .filters button {
            padding: 6px 10px;
            font-size: 14px;
        }

        .table-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .table-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        table {
            border-collapse: collapse;
            width: auto; /* wrap_content */
        }

        th, td {
            border: 1px solid #000;
            padding: 8px 12px;
        }

        .table-footer {
            margin-top: 10px;
        }
    </style>
    <script>
        function loadData() {
            fetch('/api/library/genres')
                .then(response => response.json())
                .then(genres => {
                    console.log("Got genres: ", genres.length);
                    const table = document.getElementById("genres_table");
                    const tbody = table.querySelector('tbody') || table.appendChild(document.createElement('tbody'));
                    tbody.innerHTML = '';

                    genres.forEach(genre => {
                        console.log("Genre: ", genre);
                        tbody.innerHTML += `
                            <tr>
                                <td>${genre.id}</td>
                                <td>${genre.name}</td>
                            </tr>
                        `;
                    });

                    const footer = document.getElementById("table_footer");
                    footer.innerHTML += genres.length;
                });
        }
    </script>
</head>
<body>
    <a href="/books" th:text="#{back-home}">Домой</a>

    <br/>

    <h1 th:text="#{title-library}">Библиотека</h1>

    <div class="table-container">
        <div class="table-title" th:text="#{title-genres}">Жанры</div>

        <table id="genres_table">
            <thead>
            <tr>
                <th>ID</th>
                <th th:text="#{property-title}">Название</th>
            </tr>
            </thead>
        </table>

        <div class="table-footer" id="table_footer" th:text="#{all-genres-found} + ': '">
            Всего найдено жанров: 5
        </div>
    </div>

    <script>
        loadData();
    </script>

</body>
</html>
