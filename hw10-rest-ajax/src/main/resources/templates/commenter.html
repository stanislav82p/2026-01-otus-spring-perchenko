<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title-write-comment}">Написать комментарий</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        .filters {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .filters select,
        .filters button {
            padding: 6px 10px;
            font-size: 14px;
        }

        .table-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .table-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        table {
            border-collapse: collapse;
            width: auto; /* wrap_content */
        }

        th, td {
            border: 1px solid #000;
            padding: 8px 12px;
        }

        .table-footer {
            margin-top: 10px;
        }

        .errors {
            color: red;
        }

        .row {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<a href="/books" th:text="#{back-home}">Домой</a>

<br/>

<h1 th:text="#{write-comment-for-book} + ': ' + ${book.title}">Написать комментарий для книги: ???????</h1>

<form id="comment-create-form" action="#" th:action="@{/comments(book_id=${book.id})}" th:method="post" th:object="${commentCreation}" >
    <div class="row">
        <label for="reader_selector">Select Reader:</label>
        <select id="reader_selector" th:field="*{readerId}">
            <option value="0">None</option>
            <option th:each="reader : ${readers}" th:value="${reader.id}" th:text="${reader.fullName}" />
        </select>
        <div class="errors" th:if="${#fields.hasErrors('readerId')}" th:errors="*{readerId}">Reader not selected</div>
    </div>
    <div class="row">
        <label for="comment_text_input">Comment:</label>
        <input id="comment_text_input" type="text" th:field="*{commentText}" th:value="*{commentText}"/>
        <div class="errors" th:if="${#fields.hasErrors('commentText')}" th:errors="*{commentText}">Error comment text</div>
    </div>
    <div class="row">
        <button type="submit">Create</button>
    </div>
</form>

</body>
</html>
