<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title th:text="#{create-the-book}">Добавить книгу</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        .filters {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .filters select,
        .filters button {
            padding: 6px 10px;
            font-size: 14px;
        }

        .table-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .table-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        table {
            border-collapse: collapse;
            width: auto; /* wrap_content */
        }

        th, td {
            border: 1px solid #000;
            padding: 8px 12px;
        }

        .table-footer {
            margin-top: 10px;
        }

        .errors {
            color: red;
        }

        .row {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<a href="/api/library/books" th:text="#{back-home}">Домой</a>
<br/>
<h1 th:text="#{create-the-book}">Создать книгу</h1>

<form id="edit-form" action="bookCreator.html" th:action="@{/api/library/books/creator}" th:method="POST" th:object="${edtBook}">

    <div class="row">
        <label for="book-title-input" th:text="#{input-book-title} + ':'">Название книги:</label>
        <input id="book-title-input" name="bookTitle" type="text" th:value="*{bookTitle}" value="Евгений Онегин"/>
        <div class="errors" th:if="${#fields.hasErrors('bookTitle')}" th:errors="*{bookTitle}">Ошибочка вышла</div>
    </div>

    <div class="row">
        <label for="book-author-input" th:text="#{input-book-author} + ':'">Автор книги:</label>
        <select id="book-author-input" th:field="*{authorId}">
            <option th:value="0" th:text="#{not_selected}" th:selected="*{authorId}"/>
            <option th:each="auth : ${authors}" th:value="${auth.id}" th:text="${auth.fullName}" th:selected="*{authorId}"/>
        </select>
        <div class="errors" th:if="${#fields.hasErrors('authorId')}" th:errors="*{authorId}">Ошибочка вышла</div>
    </div>

    <div class="row">
        <label for="book-genres-select" th:text="#{input-book-genres} + ':'">Жанры книги:</label>
        <select id="book-genres-select" name="genreIds" multiple>
            <option th:each="genre : ${genres}" th:value="${genre.id}" th:text="${genre.name}" th:selected="${edtBook.genreIds.contains(genre.id)}"/>
        </select>
    </div>

    <div class="row">
        <button type="submit" th:text="#{save-button-caption}">Сохранить</button>
        <a href="#" th:href="@{/api/library/books}">
            <button type="button" th:text="#{cancel-button-caption}">Отменить</button>
        </a>
    </div>
</form>

</body>
</html>
