<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title-genres}">Жанры</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        .filters {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .filters select,
        .filters button {
            padding: 6px 10px;
            font-size: 14px;
        }

        .table-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .table-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        table {
            border-collapse: collapse;
            width: auto; /* wrap_content */
        }

        th, td {
            border: 1px solid #000;
            padding: 8px 12px;
        }

        .table-footer {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<a href="/api/library/books" th:text="#{back-home}">Домой</a>

<br/>

<h1 th:text="#{title-library}">Библиотека</h1>

<div class="table-container">
    <div class="table-title" th:text="#{title-genres}">Жанры</div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th th:text="#{property-title}">Название</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="g: ${genres}">
            <td th:text="${g.id}" />
            <td th:text="${g.name}" />
        </tr>
        </tbody>
    </table>

    <div class="table-footer" th:text="#{all-genres-found} + ': ' + ${genres.size()}">
        Всего найдено жанров: 5
    </div>
</div>

</body>
</html>
