<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title-library}">Библиотека</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        .filters {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .filters select,
        .filters button {
            padding: 6px 10px;
            font-size: 14px;
        }

        .table-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .table-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        table {
            border-collapse: collapse;
            width: auto; /* wrap_content */
        }

        th, td {
            border: 1px solid #000;
            padding: 8px 12px;
        }

        .table-footer {
            margin-top: 10px;
        }

        .errors {
            color: red;
        }

        .row {
            margin-top: 24px;
        }

        .top-container {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
    </style>

    <script>
        function loadBooksWithParams() {
            const authorSelector = document.getElementById("author_selector");
            const genreSelector = document.getElementById("genre_selector");

            const authorId = authorSelector.value;
            const genreId = genreSelector.value;

            const params = new URLSearchParams();
            params.append('author_id', authorId);
            params.append('genre_id', genreId);

            fetch(`api/library/books?${params}`)
                .then(data => data.json())
                .then(data => {
                    console.log(data.books);
                    const table = document.getElementById("books_table");
                    const tbody = table.querySelector('tbody') || table.appendChild(document.createElement('tbody'));

                    tbody.innerHTML = '';
                    data.books.forEach(book => {
                        console.log(book);
                        tbody.innerHTML += `
                            <tr>
                                <td>${book.id}</td>
                                <td>${book.title}</td>
                                <td>${book.author.fullName}</td>
                                <td><a href="/books/${book.id}">${data.actionDetails}</a></td>
                                <td><a href="/books/${book.id}/delete">${data.actionDelete}</a></td>
                            </tr>
                        `;
                    });

                    const footer = document.getElementById("table_footer");
                    footer.innerHTML = data.summary;

                })
        }

        function clearFiltersAndReload() {
            const authorSelector = document.getElementById("author_selector");
            const genreSelector = document.getElementById("genre_selector");
            authorSelector.value = 0;
            genreSelector.value = 0;

            loadBooksWithParams();
        }
    </script>
</head>
<body>

<div class="top-container">
    <div>
        <a href="/books?lang=ru">ru</a>
        <a href="/books?lang=en">en</a>
    </div>
    <div>
        <a th:text="#{you-logged-in(${current_user_name})}" href="/profile">#</a>
    </div>
</div>



<h1 th:text="#{title-library}">Библиотека</h1>

<div class="filters">
    <form action="#" >
        <label for="author_selector" th:text="#{select-author} + ': '">Select Author:</label>
        <select id="author_selector" name="author_id">
            <option value="0" th:text="#{value-any}">Any</option>
            <option th:each="auth : ${authors}" th:value="${auth.id}" th:text="${auth.fullName}" th:selected="${auth.id==0}"/>
        </select>

        <label for="genre_selector" th:text="#{select-genre} + ': '">Select Genre:</label>
        <select id="genre_selector" name="genre_id">
            <option value="0" th:text="#{value-any}">Any</option>
            <option th:each="gen : ${genres}" th:value="${gen.id}" th:text="${gen.name}" th:selected="${gen.id==0}"/>
        </select>

        <button type="button" onclick="loadBooksWithParams()" th:text="#{action-apply-filter}">Применить фильтры</button>
    </form>

    <form action="#">
        <button type="button" onclick="clearFiltersAndReload()" th:text="#{action-reset-filter}">Сбросить фильтры</button>
    </form>
</div>

<div class="table-container">
    <div class="table-title" th:text="#{title-books}">Книги</div>

    <table id="books_table">
        <thead>
        <tr>
            <th>ID</th>
            <th th:text="#{property-title}">Название</th>
            <th th:text="#{property-author}">Автор</th>
            <th/>
            <th/>
        </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <div class="table-footer" id="table_footer">
        Всего найдено книг: 5
    </div>

    <div class="row">
        <form th:action="@{/books/creator}">
            <button type="submit" th:text="#{action-add-book}">Добавить книгу</button>
        </form>
    </div>
</div>

<div class="row">
    <label th:text="#{action-view-all-authors} + ' '" >Посмотреть всех</label>
    <a href="/authors" th:text="#{action-authors}" >авторов</a>
</div>

<div class="row">
    <label th:text="#{action-view-all-genres} + ' '">Посмотреть все</label>
    <a href="/genres" th:text="#{action-genres}" >жанры</a>
</div>

<script>
    clearFiltersAndReload()
</script>


</body>
</html>
