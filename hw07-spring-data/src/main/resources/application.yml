spring:
  datasource:
    url: jdbc:h2:mem:maindb
    initialization-mode: never

  sql:
    init:
      mode: always
      data-locations: data.sql
      schema-locations: schema.sql

  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        format_sql: false

    show-sql: true

  shell:
    interactive:
      enabled: true

  logging:
    level:
      ROOT: ERROR